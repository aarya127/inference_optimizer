# AMIO Phase 0 - Tech Stack Specification for Apple Silicon M3

# Core Framework
framework:
  name: "MLX"
  version: ">=0.10.0"
  rationale: |
    MLX is Apple's high-performance ML framework optimized for unified memory architecture.
    Provides native acceleration for M-series chips with efficient memory management.
  features:
    - Unified memory access (zero-copy between CPU/GPU)
    - Dynamic graph execution
    - Native Metal acceleration
    - Automatic mixed precision
    - Efficient quantization kernels

# Hardware Configuration
hardware:
  platform: "Apple Silicon M3"
  variants:
    m3_base:
      gpu_cores: 10
      unified_memory: "8GB"  # Minimum supported
      memory_bandwidth: "100 GB/s"
      neural_engine_cores: 16
    m3_pro:
      gpu_cores: 18
      unified_memory: "18GB"
      memory_bandwidth: "150 GB/s"
      neural_engine_cores: 16
    m3_max:
      gpu_cores: 40
      unified_memory: "128GB"
      memory_bandwidth: "400 GB/s"
      neural_engine_cores: 16
  
  constraints:
    single_node: true
    no_multi_gpu: true
    unified_memory: true
    max_batch_size: 2  # Conservative for 8GB memory

# Model Framework
models:
  primary_framework: "mlx-vlm"  # MLX Vision-Language Models
  fallback: "transformers + mlx_converter"
  
  supported_architectures:
    - "LLaVA"
    - "Qwen-VL"
    - "CLIP + LLaMA"
  
  quantization:
    method: "mlx.nn.quantize"
    supported_formats:
      - "int4"      # 4-bit weights
      - "int8"      # 8-bit weights  
      - "w4a8"      # 4-bit weights, 8-bit activations
    target: "int4"  # Phase 0 target
    group_size: 64  # For group quantization

# Dependencies
dependencies:
  core:
    - "mlx>=0.10.0"
    - "mlx-lm>=0.10.0"
    - "mlx-vlm>=0.1.0"  # Vision-Language support
  
  utilities:
    - "numpy>=1.24.0"
    - "pillow>=10.0.0"  # Image processing
    - "transformers>=4.40.0"  # Tokenizers and configs
    - "huggingface-hub>=0.20.0"
  
  visualization:
    - "matplotlib>=3.7.0"
    - "seaborn>=0.12.0"
  
  profiling:
    - "mlx-profiler>=0.1.0"  # Performance profiling
    - "psutil>=5.9.0"  # System metrics

# Memory Management
memory:
  strategy: "unified_memory_aware"
  allocator: "mlx.core.metal.set_memory_limit"
  
  budget:
    model_weights_4bit: "4 GB"      # 7B @ 4-bit ≈ 3.5GB
    kv_cache: "2 GB"                # For batch_size=8, seq_len=2048
    vision_embeddings: "1 GB"       # Image encoder activations
    activation_memory: "2 GB"       # Forward pass activations
    system_overhead: "1 GB"         # OS and framework
    total_target: "10 GB"           # Leaves 6GB headroom on 16GB system
  
  fragmentation_target: "<20%"

# Compute Backends
compute:
  primary: "Metal"  # MLX uses Metal Performance Shaders
  neural_engine: 
    enabled: true
    precision: ["int8", "int16"]
    note: "Automatic offload for compatible ops"
  
  cpu_fallback:
    enabled: true
    for_ops: ["specific quantization ops", "data preprocessing"]

# Precision Strategy
precision:
  default: "float16"
  vision_encoder: "float16"
  language_model: "int4"  # Quantized
  kv_cache: "float16"
  computation: "float16"  # Activations during forward pass

# Compatibility Layer
compatibility:
  huggingface_models: true
  conversion_tool: "mlx.utils.tree_map"
  config_format: "transformers.AutoConfig"
  
  model_loading:
    strategy: "lazy_loading"
    sharding: false  # Single GPU, no sharding needed
    offloading: false  # Unified memory, no CPU offload

# Performance Targets
performance_targets:
  ttft_p95: "< 500 ms"           # Time to first token (95th percentile)
  tbt_mean: "< 50 ms"            # Time between tokens (mean)
  throughput_min: "> 20 tok/s"  # Minimum generation speed
  memory_efficiency: "> 80%"     # Useful memory / allocated memory

# Simulation Framework
simulation:
  purpose: "Model multi-GPU tensor parallelism on single GPU"
  method: "artificial_delays"
  sync_points: 126  # All-Reduce operations in vision encoder
  
  delay_model:
    base_latency_us: 50        # Base all-reduce latency
    per_byte_latency_ns: 10    # Network bandwidth simulation
    synchronization_overhead_us: 20
  
  validation:
    compare_against: "H100 2xGPU baseline"
    accuracy_target: "±15% of real multi-GPU latency"

# Logging and Monitoring
monitoring:
  metrics_collection: "real-time"
  profiling_mode: "phase0_baseline"
  
  tracked_metrics:
    - "time_to_first_token"
    - "time_between_tokens"
    - "memory_usage_peak"
    - "memory_fragmentation"
    - "gpu_utilization"
    - "neural_engine_utilization"
  
  export_format: ["json", "csv", "tensorboard"]

# Development Tools
development:
  testing_framework: "pytest"
  profiler: "mlx.core.metal.start_capture"
  debugger: "lldb + metal_debug_layer"
  
  reproducibility:
    seed: 42
    deterministic: true
    cudnn_benchmark: false  # N/A for MLX

# Phase 0 Scope Boundaries
phase0_scope:
  included:
    - "MLX framework setup and validation"
    - "7B model quantization to 4-bit"
    - "Single-image inference pipeline"
    - "TP simulation framework"
    - "Baseline metric collection"
  
  excluded:
    - "Multi-image batching"
    - "Real multi-GPU testing"
    - "Adaptive controller (Phase 1)"
    - "Production deployment"
    - "Multi-modal fusion experiments"

# Validation Checklist
validation:
  - "MLX installation on M3 Mac"
  - "LLaVA-1.5-7B loads in <6GB memory"
  - "4-bit quantization produces valid outputs"
  - "TTFT measurement infrastructure works"
  - "TP simulation adds measurable delay"
  - "Metrics export to JSON/CSV"
  - "Memory profiling captures peak usage"
