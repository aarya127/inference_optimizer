# Example benchmark configuration file
# Usage: python -m src.cli benchmark --config configs/example.yaml

# Model configuration
model:
  name: "gpt2"  # or "meta-llama/Llama-2-7b-hf"
  path: null  # Optional: path to local model

# Backends to test
backends:
  - pytorch
  - vllm
  # - tensorrt
  # - deepspeed
  # - triton

# Quantization levels to test
quantizations:
  - fp16
  # - fp8
  # - int8
  # - int4

# Batch sizes to test
batch_sizes:
  - 1
  - 4
  - 8
  - 16

# Benchmark parameters
benchmark:
  num_requests: 100
  max_new_tokens: 128
  temperature: 0.8
  warmup_requests: 10

# Output configuration
output:
  dir: "results"
  save_results: true
  generate_plots: true
  generate_report: true
