# Production-ready comprehensive benchmark
# Tests all backends, quantizations, and scales

model:
  name: "meta-llama/Llama-2-7b-hf"
  path: null

backends:
  - pytorch
  - vllm
  - tensorrt
  - deepspeed
  - triton

quantizations:
  - fp16
  - fp8
  - int8
  - int4

batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128

benchmark:
  num_requests: 500
  max_new_tokens: 256
  temperature: 0.8
  warmup_requests: 50

output:
  dir: "results/production"
  save_results: true
  generate_plots: true
  generate_report: true
