# AMIO Phase 0 - Service Level Agreement (SLA) Targets

# Overview
# --------
# Phase 0 establishes baseline performance targets that the adaptive controller
# must maintain. These SLAs are based on industry standards for interactive
# multimodal AI applications.

sla_targets:
  # Primary: Time-To-First-Token (TTFT)
  # Critical for user experience - determines how long user waits for initial response
  ttft:
    target_ms: 500
    description: "Maximum time from request submission to first token"
    percentile: "p95"  # 95% of requests must meet this target
    
    breakdown:
      image_preprocessing_max_ms: 50
      vision_encoding_max_ms: 200
      projection_max_ms: 20
      prompt_processing_max_ms: 100
      first_token_generation_max_ms: 130
      
    rationale: |
      - 500ms is threshold for "instant" feel in interactive applications
      - Vision encoding dominates (200ms) due to 576 patches @ 24 layers
      - Prompt processing scales with prompt length (64 tokens = ~100ms)
      - First token includes KV cache initialization overhead
    
    success_criteria:
      single_image_single_prompt:
        target: "< 500ms"
        p95: "< 500ms"
        p99: "< 650ms"
        
      batch_2:
        target: "< 550ms"
        p95: "< 550ms"
        
      batch_4:
        target: "< 650ms"
        p95: "< 650ms"
  
  # Secondary: Time-Between-Tokens (TBT)
  # Affects generation smoothness - user perceives lag at >100ms
  tbt:
    target_ms: 50
    description: "Average time to generate each subsequent token"
    percentile: "mean"
    
    success_criteria:
      mean: "< 50ms"
      p90: "< 60ms"
      p99: "< 80ms"
      
    rationale: |
      - 50ms = 20 tokens/second, comfortable reading speed
      - At 35-40ms (25-28 tok/s) feels instantaneous
      - Above 100ms (10 tok/s) feels sluggish
      - Batch processing increases TBT proportionally
    
    throughput_targets:
      single_request: "> 20 tok/s"
      batch_2: "> 15 tok/s per request"
      batch_4: "> 12 tok/s per request"
  
  # Tertiary: Memory Fragmentation
  # Affects stability and batch size capacity
  fragmentation:
    target_percent: 20
    description: "Maximum memory waste due to fragmentation"
    
    success_criteria:
      idle_state: "< 10%"
      single_request: "< 15%"
      sustained_load: "< 20%"
      burst_load: "< 25%"
      
    rationale: |
      - High fragmentation (>25%) leads to OOM errors
      - Low fragmentation (<15%) enables larger batch sizes
      - Fragmentation accumulates over time without proper management
      - KV cache reuse reduces fragmentation significantly
    
    memory_targets_m3_16gb:
      model_weights: "4.5 GB"
      kv_cache_per_request: "256 MB (1K tokens)"
      activations_per_request: "400 MB"
      system_overhead: "2 GB"
      remaining_for_batching: "8.8 GB"
      max_concurrent_requests: 6

# Performance Budgets by Phase
performance_budgets:
  # Phase 0: Baseline (INT4, Single-GPU)
  phase0_baseline:
    ttft_target_ms: 500
    tbt_target_ms: 50
    fragmentation_target_percent: 20
    max_batch_size: 4
    
  # Phase 1: With Adaptive Controller
  phase1_adaptive:
    ttft_p95_ms: 480  # 4% improvement
    tbt_mean_ms: 45   # 10% improvement
    fragmentation_mean_percent: 15  # 25% improvement
    max_batch_size: 6  # 50% improvement
    
    expected_improvements:
      - "Intelligent KV cache management reduces fragmentation"
      - "Prefix caching for repeated image embeddings"
      - "Dynamic batching based on TTFT/TBT budget"
      - "Request scheduling to maximize throughput"

# SLA Violation Handling
violation_policies:
  ttft_exceeded:
    threshold: "500ms"
    action: "Reject new requests until queue clears"
    recovery: "Resume when TTFT returns to < 400ms"
    
  tbt_degradation:
    threshold: "80ms sustained for 10 tokens"
    action: "Reduce batch size by 1"
    recovery: "Gradually increase batch when TBT < 50ms"
    
  fragmentation_critical:
    threshold: "30%"
    action: "Trigger garbage collection and cache eviction"
    recovery: "Resume normal operation when < 20%"
    
  oom_prevention:
    threshold: "Available memory < 2GB"
    action: "Emergency cache flush, reject requests"
    recovery: "Reload model if necessary"

# Workload Profiles
workload_profiles:
  # Interactive single-user
  interactive:
    arrival_pattern: "sporadic"
    request_rate: "1-2 req/min"
    batch_size: 1
    sla_priority: "TTFT < 400ms"
    
  # Demo/presentation mode
  demo:
    arrival_pattern: "burst"
    request_rate: "5-10 req/min"
    batch_size: "2-3"
    sla_priority: "TTFT < 500ms, TBT < 60ms"
    
  # Batch processing
  batch_processing:
    arrival_pattern: "steady"
    request_rate: "continuous"
    batch_size: "4-6"
    sla_priority: "Throughput > 80 tok/s total"
    
  # Evaluation/benchmarking
  benchmark:
    arrival_pattern: "controlled"
    request_rate: "variable"
    batch_size: "1, 2, 4, 8"
    sla_priority: "Measure all metrics accurately"

# Measurement Infrastructure
measurement:
  # How metrics are collected
  collection:
    ttft:
      start_point: "Request received (image + prompt)"
      end_point: "First token emitted"
      resolution: "millisecond"
      
    tbt:
      start_point: "Previous token emitted"
      end_point: "Current token emitted"
      resolution: "millisecond"
      
    fragmentation:
      sample_frequency: "Per request completion"
      calculation: "(Allocated - Used) / Allocated * 100"
      
  # Reporting intervals
  reporting:
    real_time_dashboard: "1 second"
    aggregated_summary: "Per request"
    historical_logging: "All requests to JSON"
    
  # Percentile computation
  percentiles:
    methods: "numpy.percentile"
    window_size: "Last 100 requests"
    required_samples: "Minimum 10 for valid p95/p99"

# Success Criteria for Phase 0
phase0_success_criteria:
  functional:
    - "✅ LLaVA-1.5-7B loads and runs on M3 16GB"
    - "✅ INT4 quantization reduces memory to <6GB"
    - "✅ Single-image inference produces valid outputs"
    - "✅ Metrics collection infrastructure operational"
    - "✅ TP simulation adds measurable overhead"
    
  performance:
    - "✅ TTFT p95 < 500ms for single request"
    - "✅ TBT mean < 50ms (>20 tok/s)"
    - "✅ Fragmentation < 20% sustained"
    - "✅ Batch size 4 works within memory limits"
    - "✅ No OOM errors during normal operation"
    
  accuracy:
    - "✅ INT4 model accuracy >90% of FP16 baseline"
    - "✅ TP simulation latency within ±15% of real 2xGPU"
    - "✅ Metrics collection overhead < 1%"
    
  readiness:
    - "✅ Cost models for Phase 1 controller defined"
    - "✅ Baseline metrics collected and documented"
    - "✅ Simulation methodology validated"
    - "✅ Memory profiling complete"

# Pareto-Optimal Trade-offs
pareto_optimization:
  # Cannot maximize all three simultaneously
  trade_offs:
    latency_vs_throughput:
      description: "Lower latency (batch=1) vs higher throughput (batch=8)"
      optimization: "Adaptive batching based on workload"
      
    quality_vs_memory:
      description: "Higher precision (FP16) vs lower memory (INT4)"
      optimization: "INT4 for LLM, FP16 for vision encoder"
      
    ttft_vs_batch_size:
      description: "Fast TTFT (small batch) vs high throughput (large batch)"
      optimization: "Dynamic batch size based on queue length"
      
  # Phase 0 operating point
  phase0_operating_point:
    position: "Balanced"
    characteristics:
      - "INT4 quantization for memory efficiency"
      - "Batch size 1-4 for responsive TTFT"
      - "Single-GPU for cost/simplicity"
      - "Simulated TP for future multi-GPU readiness"
    
    future_options:
      - "Phase 1: Adaptive controller dynamically adjusts operating point"
      - "Phase 2: Multi-GPU TP for higher throughput"
      - "Phase 3: Speculative decoding for lower latency"

# Monitoring and Alerting
monitoring:
  dashboards:
    real_time:
      metrics:
        - "Current TTFT (last 10 requests)"
        - "Current TBT (last 100 tokens)"
        - "Memory usage and fragmentation"
        - "Queue length and wait time"
      
    historical:
      metrics:
        - "TTFT p50/p95/p99 over time"
        - "TBT distribution"
        - "Fragmentation trends"
        - "SLA compliance rate"
  
  alerts:
    - condition: "TTFT p95 > 500ms for 5 consecutive requests"
      severity: "warning"
      action: "Log and reduce batch size"
      
    - condition: "TTFT p95 > 650ms"
      severity: "critical"
      action: "Reject new requests"
      
    - condition: "Fragmentation > 25%"
      severity: "warning"
      action: "Trigger cache cleanup"
      
    - condition: "Available memory < 2GB"
      severity: "critical"
      action: "Emergency shutdown"
