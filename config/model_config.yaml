# AMIO Phase 0 - Multimodal Model Configuration

# 3B Parameter Multimodal Models for M3 Mac (8GB)

# Model 1: LLaVA-v1.6-Mistral-7B (Smaller variant compatible with 8GB)
llava_3b:
  name: "llava-hf/llava-v1.6-vicuna-7b-hf"
  huggingface_id: "llava-hf/llava-v1.6-vicuna-7b-hf"
  
  architecture:
    vision_encoder: "CLIP ViT-L/14"
    vision_hidden_size: 1024
    projection_layer: "MLP (1024 → 3072)"
    language_model: "Vicuna-7B"
    language_hidden_size: 3072
    
  parameters:
    total: "7.0B"
    vision_encoder: "304M"
    projection: "3M"
    language_model: "6.7B"
    
  memory_footprint:
    fp16_full: "14 GB"
    fp16_inference: "15 GB"  # Including activations
    int4_inference: "4.2 GB"  # Target for M3 8GB
    kv_cache_per_token: "192 KB"
    
  input_specs:
    image_size: [336, 336]
    image_channels: 3
    max_text_length: 2048
    vision_patches: 576  # 24x24 patches
    
  output_specs:
    max_generation_length: 256
    vocab_size: 32000
    
  quantization_strategy:
    vision_encoder: "fp16"  # Keep vision in fp16 for quality
    projection: "fp16"
    language_model: "int4"  # Aggressive quantization for 8GB
    embeddings: "fp16"
    lm_head: "fp16"
    
  performance_estimates:
    ttft_fp16: "700ms"  # Baseline
    ttft_int4: "400ms"  # Target
    tbt_fp16: "70ms"
    tbt_int4: "40ms"
    throughput_int4: "22 tok/s"

# Model 2: Qwen-VL-7B (Alternative)
qwen_vl_7b:
  name: "Qwen-VL-7B"
  huggingface_id: "Qwen/Qwen-VL"
  
  architecture:
    vision_encoder: "ViT-bigG"
    vision_hidden_size: 1664
    projection_layer: "Linear (1664 → 4096)"
    language_model: "Qwen-7B"
    language_hidden_size: 4096
    
  parameters:
    total: "7.7B"
    vision_encoder: "1.9B"  # Larger vision encoder
    projection: "7M"
    language_model: "5.8B"
    
  memory_footprint:
    fp16_full: "15.4 GB"
    fp16_inference: "17 GB"
    int4_inference: "5.2 GB"
    kv_cache_per_token: "256 KB"
    
  input_specs:
    image_size: [448, 448]  # Higher resolution
    image_channels: 3
    max_text_length: 2048
    vision_patches: 1024  # More patches
    
  output_specs:
    max_generation_length: 512
    vocab_size: 151851  # Larger vocab
    
  quantization_strategy:
    vision_encoder: "fp16"
    projection: "fp16"
    language_model: "int4"
    embeddings: "fp16"
    lm_head: "fp16"
    
  performance_estimates:
    ttft_fp16: "1100ms"  # Slower due to larger vision encoder
    ttft_int4: "620ms"
    tbt_fp16: "85ms"
    tbt_int4: "48ms"
    throughput_int4: "21 tok/s"

# Baseline Configuration (CLIP + LLaMA-2-7B)
clip_llama_7b:
  name: "CLIP-LLaMA-7B"
  description: "Custom baseline: CLIP ViT-L/14 + LLaMA-2-7B-Chat"
  
  architecture:
    vision_encoder: "openai/clip-vit-large-patch14"
    language_model: "meta-llama/Llama-2-7b-chat-hf"
    projection: "Custom Linear (768 → 4096)"
    
  parameters:
    total: "7.3B"
    vision_encoder: "304M"
    projection: "3M"
    language_model: "7B"
    
  memory_footprint:
    int4_inference: "4.3 GB"
    
  use_case: "Simplified baseline for debugging"

# Phase 0 Model Selection
phase0_model:
  primary: "llava_1_5_7b"
  rationale: |
    LLaVA-1.5-7B selected for Phase 0 because:
    1. Smaller vision encoder (304M vs 1.9B) fits M3 constraints better
    2. Well-documented and tested in MLX ecosystem
    3. Lower TTFT target (450ms vs 620ms)
    4. Extensive benchmarks available for validation
    5. Active community support
  
  alternative: "qwen_vl_7b"
  alternative_rationale: "Use if higher visual quality needed despite latency cost"

# Memory Budget Breakdown (M3 16GB Base)
memory_budget:
  model: "LLaVA-1.5-7B @ INT4"
  
  components:
    vision_encoder_weights: "608 MB"    # 304M params @ fp16
    projection_weights: "8 MB"          # 4M params @ fp16
    language_model_weights: "3500 MB"   # 7B params @ int4 (0.5 bytes/param)
    embeddings: "256 MB"                # Vocab embeddings @ fp16
    lm_head: "256 MB"                   # Output projection @ fp16
    
    subtotal_static: "4628 MB"          # ~4.5 GB
    
    # Dynamic memory (per request)
    vision_activations: "400 MB"        # Forward pass through vision encoder
    kv_cache_1k_tokens: "256 MB"        # 1024 tokens cached
    generation_activations: "300 MB"    # LLM forward pass
    input_embeddings: "50 MB"           # Image + text embeddings
    
    subtotal_dynamic: "1006 MB"         # ~1 GB per request
    
    # System overhead
    mlx_runtime: "500 MB"
    os_reserved: "500 MB"
    safety_margin: "1000 MB"
    
    subtotal_overhead: "2000 MB"        # ~2 GB
    
    total_peak: "7634 MB"               # ~7.5 GB peak for single request
    
  batch_scaling:
    batch_1: "7.5 GB"
    batch_2: "8.8 GB"   # Shared vision encoder, 2x kv cache
    batch_4: "11.4 GB"
    batch_8: "16.6 GB"  # Near M3 16GB limit
    
  max_safe_batch_size: 6  # Conservative target

# Model Loading Configuration
loading:
  strategy: "lazy"
  precision: "mixed"
  
  steps:
    - step: "Load vision encoder"
      precision: "fp16"
      memory: "608 MB"
      
    - step: "Load projection layer"
      precision: "fp16"
      memory: "8 MB"
      
    - step: "Load language model"
      precision: "int4"
      memory: "3500 MB"
      quantization: "group_size_64"
      
    - step: "Allocate KV cache"
      precision: "fp16"
      memory: "256 MB"  # Initial allocation for 1K tokens
      
  validation:
    - "Run dummy forward pass"
    - "Measure peak memory"
    - "Verify output shape"
    - "Check generation quality"

# Quantization Configuration
quantization:
  target: "int4"
  method: "group_quantization"
  
  settings:
    bits: 4
    group_size: 64  # Quantize in groups of 64 weights
    
  quantized_layers:
    - "language_model.model.layers.*.self_attn.q_proj"
    - "language_model.model.layers.*.self_attn.k_proj"
    - "language_model.model.layers.*.self_attn.v_proj"
    - "language_model.model.layers.*.self_attn.o_proj"
    - "language_model.model.layers.*.mlp.gate_proj"
    - "language_model.model.layers.*.mlp.up_proj"
    - "language_model.model.layers.*.mlp.down_proj"
    
  excluded_layers:
    - "vision_tower.*"  # Keep vision in fp16
    - "multi_modal_projector.*"  # Keep projection in fp16
    - "language_model.model.embed_tokens"  # Keep embeddings in fp16
    - "language_model.lm_head"  # Keep output projection in fp16
    
  calibration:
    dataset: "COCO-2017-val"
    samples: 128
    method: "minmax"  # Min-max calibration for INT4

# Validation Benchmarks
validation:
  datasets:
    - name: "VQAv2"
      metric: "Accuracy"
      baseline_fp16: "78.5%"
      target_int4: ">70.0%"  # Allow 8.5% degradation
      
    - name: "GQA"
      metric: "Accuracy"
      baseline_fp16: "62.0%"
      target_int4: ">56.0%"
      
    - name: "COCO Captioning"
      metric: "CIDEr"
      baseline_fp16: "112.3"
      target_int4: ">100.0"
      
  performance:
    ttft_target: "< 500ms"
    tbt_target: "< 50ms"
    memory_target: "< 8GB peak"

# MLX-Specific Configuration
mlx_config:
  max_kv_cache_size: "2048"  # Max tokens to cache
  attention_backend: "metal"
  quantization_backend: "mlx.nn.quantize"
  
  optimizations:
    - "Fused attention kernels"
    - "Efficient KV cache management"
    - "Unified memory allocation"
    - "Lazy evaluation"
    
  metal_config:
    command_buffer_size: "large"
    heap_type: "shared"  # Use unified memory
    resource_options: "storage_mode_shared"
